services:
  redis:
    image: redis:7-alpine
    container_name: travel-agent-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travel-agent-backend
    env_file:
      - ./.env
    environment:
      REDIS_URL: redis://redis:6379/0
      REDIS_PREFIX: travel_agent
      MEMORY_TTL_SECONDS: 604800
    depends_on:
      - redis
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: travel-agent-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  redis-data:
