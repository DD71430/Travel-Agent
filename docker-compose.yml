name: travel_agent

services:
  redis:
    image: redis:7-alpine
    container_name: travel_agent_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

  travel_agent_backend:
    image: travel_agent_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travel_agent_backend
    env_file:
      - ./.env
    environment:
      REDIS_URL: redis://redis:6379/0
      REDIS_PREFIX: travel_agent
      MEMORY_TTL_SECONDS: 604800
    depends_on:
      - redis
    ports:
      - "8000:8000"
    restart: unless-stopped

  travel_agent_frontend:
    image: travel_agent_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: travel_agent_frontend
    depends_on:
      - travel_agent_backend
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  redis-data:
